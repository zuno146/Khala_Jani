<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Sweet Khala</title>

  <style>

    body{
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;

      background-image:
      linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
      url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80");

      background-size: cover;
      background-position: center;
    }

    .card{
      width: 420px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      color: white;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      font-size: 45px;
      margin-bottom: 15px;
      color: #ffe066;
      text-shadow: 2px 2px 8px black;
    }

    p{
      font-size: 20px;
      line-height: 32px;
      text-shadow: 1px 1px 5px black;
    }

    .line{
      width: 80px;
      height: 4px;
      background-color: white;
      margin: 15px auto;
      border-radius: 20px;
    }

    button{
      margin-top: 20px;
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      background-color: #ffe066;
      color: black;
      font-size: 17px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover{
      transform: scale(1.08);
      background-color: white;
    }

  </style>
</head>
<body>

  <div class="card">

    <h1>My Sweet Khala Jani 💖</h1>

    <div class="line"></div>

    <p>
      You are the sunshine in every moment of life.
      Your kindness, love, and care make everything beautiful.
      Thank you for always being so special.
    </p>

    <button>With Love 🌸</button>

  </div>

</body>
</html>
